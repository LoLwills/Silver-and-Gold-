<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JRC LIVE | INR BULLION</title>
    <style>
        :root { --neon: #00f2ff; --gold: #ffd700; --silver: #e5e5e5; }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Arial', sans-serif; height: 100vh; overflow: hidden; }

        /* NEON LED BORDER */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            border: 5px solid var(--neon);
            box-shadow: inset 0 0 20px var(--neon), 0 0 20px var(--neon);
            z-index: 100; pointer-events: none; animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }

        .container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .header { text-transform: uppercase; letter-spacing: 5px; color: var(--neon); margin-bottom: 30px; font-size: 14px; }

        .price-box {
            background: rgba(255,255,255,0.05);
            width: 85%; max-width: 400px;
            padding: 25px; border-radius: 15px;
            margin-bottom: 20px; border-left: 5px solid var(--gold);
            backdrop-filter: blur(10px);
        }
        .silver-box { border-left-color: var(--silver); }

        .label { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .price { font-size: 36px; font-weight: bold; font-family: 'Courier New', monospace; }
        .unit { font-size: 14px; color: #555; margin-left: 5px; }

        .change { font-size: 14px; margin-top: 5px; }
        .up { color: #00ff00; }
        .down { color: #ff0000; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">JRC Real-Time Terminal (INR)</div>

        <div class="price-box">
            <div class="label">Gold 24K (10 GM)</div>
            <div class="price" style="color: var(--gold);">₹<span id="gold-val">72,450</span></div>
            <div id="gold-change" class="change up">▲ +0.15%</div>
        </div>

        <div class="price-box silver-box">
            <div class="label">Silver (1 KG)</div>
            <div class="price" style="color: var(--silver);">₹<span id="silver-val">84,200</span></div>
            <div id="silver-change" class="change down">▼ -0.08%</div>
        </div>

        <div style="font-size: 10px; color: #444; letter-spacing: 2px;">MARKET LIVE • MCX BASED</div>
    </div>

    <script>
        // Initial Base Prices in INR
        let gPrice = 72450.00; 
        let sPrice = 84200.00;

        function updateTickers() {
            // Simulate random market movement (+/- 2 to 5 rupees)
            let gMove = (Math.random() * 10 - 5);
            let sMove = (Math.random() * 20 - 10);
            
            gPrice += gMove;
            sPrice += sMove;

            // Update UI
            document.getElementById('gold-val').innerText = Math.floor(gPrice).toLocaleString('en-IN');
            document.getElementById('silver-val').innerText = Math.floor(sPrice).toLocaleString('en-IN');

            // Change Colors for "Live" feel
            updateChangeStatus('gold-change', gMove);
            updateChangeStatus('silver-change', sMove);
        }

        function updateChangeStatus(id, move) {
            const el = document.getElementById(id);
            if(move > 0) {
                el.innerText = "▲ UPING"; el.className = "change up";
            } else {
                el.innerText = "▼ DOWNING"; el.className = "change down";
            }
        }

        // Tick every 1 second (1000ms) like a real app
        setInterval(updateTickers, 1000);
    </script>
</body>
</html>

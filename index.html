<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Bullion Exchange | JRC</title>
    <style>
        :root { 
            --bg-dark: #020202; 
            --neon-blue: #00f2ff; 
            --gold: #ffcc00; 
            --silver: #ffffff; 
        }

        body, html { 
            margin: 0; padding: 0; 
            background: var(--bg-dark); 
            color: white; 
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- THE NEON LED BORDER --- */
        .neon-border {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            border: 5px solid var(--neon-blue);
            box-shadow: inset 0 0 20px var(--neon-blue), 0 0 30px var(--neon-blue);
            z-index: 100; pointer-events: none;
            animation: neonFlicker 3s infinite alternate;
        }

        @keyframes neonFlicker {
            0%, 100% { opacity: 1; filter: brightness(1); }
            50% { opacity: 0.7; filter: brightness(1.2); }
            70% { opacity: 0.9; }
        }

        /* MAIN DASHBOARD */
        .dashboard {
            position: relative; z-index: 10;
            text-align: center;
            width: 90%; max-width: 800px;
        }

        .header-title {
            text-transform: uppercase;
            letter-spacing: 15px;
            font-size: clamp(18px, 4vw, 32px);
            margin-bottom: 50px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .market-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .price-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 40px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .price-card:hover {
            transform: scale(1.05);
            border-color: var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
        }

        .asset-label {
            font-size: 12px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 15px;
        }

        .price-value {
            font-size: clamp(24px, 6vw, 48px);
            font-weight: 800;
            font-family: 'Courier New', Courier, monospace;
        }

        .gold-glow { color: var(--gold); text-shadow: 0 0 15px rgba(255, 204, 0, 0.4); }
        .silver-glow { color: var(--silver); text-shadow: 0 0 15px rgba(255, 255, 255, 0.4); }

        .status-dot {
            width: 8px; height: 8px;
            background: #00ff00;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 8px #00ff00;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        footer {
            position: absolute; bottom: 40px;
            font-size: 10px; letter-spacing: 3px; color: #444;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="neon-border"></div>

    <div class="dashboard">
        <h1 class="header-title">Live Bullion Market</h1>

        <div class="market-grid">
            <div class="price-card">
                <div class="asset-label">Gold Spot / USD</div>
                <div id="gold-price" class="price-value gold-glow">---</div>
            </div>

            <div class="price-card">
                <div class="asset-label">Silver Spot / USD</div>
                <div id="silver-price" class="price-value silver-glow">---</div>
            </div>
        </div>

        <div style="margin-top: 40px; font-size: 11px; color: #888;">
            <span class="status-dot"></span> REAL-TIME FEED ACTIVE
        </div>

        <footer>© 2026 J Ram Chandran Executive Terminal</footer>
    </div>

    <script>
        // We use the Crypto-backed Gold/Silver feed for instant free updates
        async function updateMarket() {
            try {
                // Fetching Gold (PAXG) and Silver (XAG alternative)
                const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbols=["PAXGUSDT"]');
                const data = await response.json();
                
                const gold = parseFloat(data[0].price).toFixed(2);
                // Silver is calculated using a dynamic spot ratio (approx 1:88)
                const silver = (gold / 88.4).toFixed(2);

                document.getElementById('gold-price').innerText = `$${gold}`;
                document.getElementById('silver-price').innerText = `$${silver}`;
            } catch (err) {
                console.log("Feed Error", err);
            }
        }

        updateMarket();
        setInterval(updateMarket, 10000); // Updates every 10 seconds
    </script>
</body>
</html>
